services:
  db:
    image: postgres:17
    container_name: odoo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build: .
    container_name: odoo18
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8069:8069"
    env_file:
      - .env
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - ./addons:/mnt/extra-addons
      - odoo-data:/var/lib/odoo

volumes:
  postgres-data:
  odoo-data: