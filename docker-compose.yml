services:
  db:
    image: postgres:16
    container_name: odoo-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - postgres-data:/var/lib/postgresql/data

  odoo:
    image: odoo:18
    container_name: odoo18
    depends_on:
      - db
    ports:
      - "8069:8069"
    env_file:
      - .env
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
      OPENAI_API_KEY: tu_api_key_aqui
    volumes:
      - ./addons:/mnt/extra-addons
      - odoo-data:/var/lib/odoo

volumes:
  postgres-data:
  odoo-data: